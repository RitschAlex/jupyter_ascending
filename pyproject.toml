[tool.poetry]
name = "jupyter_ascending"
# Make sure to also update _version.py when doing version bump.
version = "0.1.27"
description = ""
authors = ["Josh Albrecht <joshalbrecht@gmail.com>", "TJ DeVries <devries.timothyj@gmail.com>"]

[tool.poetry.dependencies]
python = "^3.9"
jupytext = "^1.14.4"
jsonrpcserver = "^5.0.9"
jsonrpcclient = "^4.0.3"
loguru = ">=0.4.1"
editdistance = "^0.8.0"
jupyter-client = "^8.6.0"
requests = "^2.31.0"
aiohttp = "^3.9.5"
frozenlist = ">=1.4.1"
pyzmq = ">=26.2.0"
pyyaml = ">=6.0.2"
notebook = ">=7,<8"
# Classic UI compatibility (enabled when JUPYTER_ASCENDING_CLASSIC=1)
nbclassic = { version = ">=1.0.0", optional = true, markers = "python_version >= '3.9'" }

[tool.poetry.dev-dependencies]
pyfixfmt = "^0.9.0"
pytest = ">=7.2.0"
pytest-asyncio = ">=0.20.3"

[tool.poetry.scripts]

[tool.poetry.extras]
classic = ["nbclassic"]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
